# 모델 설정
model:
  name: "yolov8n"
  engine_path: "models/yolov8n.engine"
  onnx_path: "models/yolov8n.onnx"
  input_shape: [1, 3, 640, 640]   # (N, C, H, W)
  num_classes: 80
  confidence_threshold: 0.5
  nms_threshold: 0.45
  class_names_path: "config/coco_classes.txt"

# TensorRT 빌드 설정
tensorrt:
  fp16: true          # FP16 정밀도 활성화 (젯슨 권장)
  int8: false         # INT8은 별도 캘리브레이션 필요
  max_workspace_gb: 4
  max_batch_size: 1
